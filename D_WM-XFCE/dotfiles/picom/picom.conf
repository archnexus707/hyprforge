# picom.conf — D_WM-XFCE for picom-ftlabs (X11 with animations).
# This file targets the FT-Labs picom fork; some keys are not valid in upstream
# picom. The vmware.sh install-script writes ~/.config/picom/vmware.conf which
# is conditionally @included below.

# ----- shadow ----------------------------------------------------------------
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.45;
shadow-offset-x = -16;
shadow-offset-y = -16;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ----- fading ----------------------------------------------------------------
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 6;

# ----- transparency / opacity ------------------------------------------------
inactive-opacity = 0.92;
frame-opacity = 0.85;
inactive-opacity-override = false;
active-opacity = 1.0;
opacity-rule = [
    "100:class_g = 'firefox' && focused",
    "85:class_g  = 'kitty'",
    "90:class_g  = 'Rofi'",
    "80:class_g  = 'Thunar'"
];

# ----- corners (picom-ftlabs) ------------------------------------------------
corner-radius = 10;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3-frame'"
];

# ----- blur (dual-kawase via picom-ftlabs) -----------------------------------
blur-method = "dual_kawase";
blur-size = 12;
blur-strength = 5;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ----- animations (picom-ftlabs) ---------------------------------------------
animations = true;
animation-stiffness = 300;
animation-dampening = 25;
animation-clamping = false;
animation-mass = 1;
animation-for-open-window     = "zoom";
animation-for-unmap-window    = "zoom";
animation-for-workspace-switch-in  = "slide-down";
animation-for-workspace-switch-out = "slide-up";
animation-for-transient-window     = "slide-down";

# ----- backend ---------------------------------------------------------------
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;
vsync = true;
unredir-if-possible = false;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

# ----- window-type overrides -------------------------------------------------
wintypes:
{
    tooltip      = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
    dock         = { shadow = false; clip-shadow-above = true; };
    dnd          = { shadow = false; };
    popup_menu   = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
    notification = { opacity = 0.95; };
};

# ----- VMware override (only present when vmware.sh ran) ---------------------
# The @include is non-fatal if the file is missing.
# @include "vmware.conf"
