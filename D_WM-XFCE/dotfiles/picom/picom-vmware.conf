# picom-vmware.conf — D_WM-XFCE VMware-safe compositor
# Uses xrender backend — works on VMware's virtual GPU without crashes.
# Shadows and fading are the only effects available with xrender.

# ── shadows ───────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.35;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── fading ────────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 4;

# ── opacity ───────────────────────────────────────────────────────────────────
inactive-opacity = 0.95;
frame-opacity = 0.90;
inactive-opacity-override = false;
active-opacity = 1.0;

# ── backend (VMware-safe) ─────────────────────────────────────────────────────
backend = "xrender";
use-damage = true;
vsync = false;
unredir-if-possible = true;
detect-rounded-corners = false;
detect-client-opacity = false;
detect-transient = true;
detect-client-leader = true;

# ── window-type overrides ─────────────────────────────────────────────────────
wintypes:
{
    tooltip      = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
    dock         = { shadow = false; clip-shadow-above = true; };
    dnd          = { shadow = false; };
    popup_menu   = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
    notification = { opacity = 0.95; };
};
