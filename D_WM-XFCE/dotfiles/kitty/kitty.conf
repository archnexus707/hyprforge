# kitty.conf — D_WM-XFCE base config.
# Color scheme is included from ~/.config/kitty/theme.conf, which the
# dwm-theme switcher symlinks to one of themes/<name>/kitty.conf.

# ----- font ------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5
disable_ligatures never
modify_font cell_height 110%

# ----- window ----------------------------------------------------------------
window_padding_width 8
window_margin_width  0
hide_window_decorations yes
background_opacity 0.88
dynamic_background_opacity yes
confirm_os_window_close 0

# ----- cursor ----------------------------------------------------------------
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 8.0
mouse_hide_wait 2.0

# ----- scrollback ------------------------------------------------------------
scrollback_lines 10000
wheel_scroll_multiplier 5.0

# ----- bell ------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# ----- tabs ------------------------------------------------------------------
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_title_template " {index}: {title} "

# ----- shell -----------------------------------------------------------------
shell zsh
shell_integration enabled

# ----- keybinds (Hyprland-style) ---------------------------------------------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0
map ctrl+shift+f5 load_config_file

# Theme include — the switcher overwrites theme.conf symlink to swap palettes
include theme.conf
